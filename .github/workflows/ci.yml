name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skribble
          POSTGRES_PASSWORD: skribble
          POSTGRES_DB: skribble_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U skribble"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      DATABASE_URL: postgresql://skribble:skribble@localhost:5432/skribble_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-which-is-long-enough
      JWT_REFRESH_SECRET: ci-refresh-secret-which-is-long-enough

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Use `npm install` (not `npm ci`): commit a full root package-lock.json
      # generated by a one-time `npm install` at the repo root to switch to `npm ci`.
      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build -w @skribble/shared

      - name: Generate Prisma client
        run: npm run prisma:generate -w @skribble/backend

      - name: Push schema to test DB
        run: npx -w @skribble/backend prisma db push --skip-generate

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Test — shared
        run: npm run test -w @skribble/shared

      - name: Test — backend (unit + e2e)
        run: npm run test -w @skribble/backend

      - name: Test — frontend
        run: npm run test -w @skribble/frontend

      - name: Build — backend
        run: npm run build -w @skribble/backend

      - name: Build — frontend
        run: npm run build -w @skribble/frontend

  docker:
    name: Build & push images
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest,ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest,ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
