# ─────────────────────────────────────────────────────────────────────────────
# Edge reverse proxy + load balancer.
#
#   browser ──▶ nginx :80 ──┬─ /            ─▶ frontend  (static SPA)
#                           ├─ /api/*       ─▶ backend   (REST)
#                           └─ /socket/*    ─▶ backend   (Socket.IO, WS upgrade)
#
# Scaling: `ip_hash` pins a client to one backend replica = STICKY SESSIONS,
# which Socket.IO needs because the HTTP long-poll handshake and the WS upgrade
# must hit the same node. Cross-node broadcasts are handled by the Redis adapter,
# so sticky routing only needs to be per-connection, not per-room.
# ─────────────────────────────────────────────────────────────────────────────
worker_processes auto;
events { worker_connections 8192; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream skribble_backend {
    ip_hash;                 # sticky sessions
    server backend:3000;
    # Add more replicas here (or use Docker DNS round-robin + a shared Redis):
    # server backend2:3000;
    keepalive 64;
  }

  upstream skribble_frontend {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    # Basic hardening.
    server_tokens off;
    client_max_body_size 2m;

    # ── REST API ──
    location /api/ {
      proxy_pass http://skribble_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
      proxy_pass http://skribble_backend/health;
    }

    # ── Socket.IO (WebSocket upgrade) ──
    location /socket/ {
      proxy_pass http://skribble_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 600s;   # keep long-lived sockets open
      proxy_send_timeout 600s;
    }

    # ── Static SPA ──
    location / {
      proxy_pass http://skribble_frontend;
      proxy_set_header Host $host;
    }
  }
}
